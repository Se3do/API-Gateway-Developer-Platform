apiVersion: v1
kind: Secret
metadata:
  name: gateway-secrets
  namespace: api-gateway
type: Opaque
stringData:
  ACCESS_TOKEN_SECRET: change-me-to-a-random-32-char-string
  REFRESH_TOKEN_SECRET: change-me-to-another-random-32-char
  ALERT_SECRET: change-me-alert-secret
  POSTGRES_USER: user
  POSTGRES_PASSWORD: password
