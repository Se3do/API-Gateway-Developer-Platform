apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: api-gateway
spec:
  ports:
    - port: 4001
  selector:
    app: auth-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth
          image: apigateway-auth-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4001
          envFrom:
            - configMapRef:
                name: gateway-config
          env:
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: gateway-config
                  key: DATABASE_URL_AUTH
            - name: ACCESS_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: gateway-secrets
                  key: ACCESS_TOKEN_SECRET
            - name: REFRESH_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: gateway-secrets
                  key: REFRESH_TOKEN_SECRET
          livenessProbe:
            httpGet:
              path: /health
              port: 4001
            initialDelaySeconds: 10
            periodSeconds: 10
